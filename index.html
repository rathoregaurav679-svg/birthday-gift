```html
<!DOCTYPE html>
<html>
<head>

<title>Survhi Madam Ji Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
overflow-x:hidden;
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
margin-top:40px;
}

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff2d55;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.section{
display:none;
padding:40px;
}

.cake{
font-size:120px;
cursor:pointer;
}

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.gallery img{
width:200px;
height:200px;
object-fit:cover;
border-radius:20px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

.envelope{
font-size:120px;
cursor:pointer;
}

#letter{
display:none;
background:white;
color:#ff2d55;
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
}

.heart{
position:fixed;
bottom:-10px;
font-size:25px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

.choco{
position:absolute;
font-size:40px;
cursor:pointer;
animation:fallChoco 4s linear;
}

@keyframes fallChoco{
0%{top:-50px}
100%{top:300px}
}

</style>
</head>

<body>

<h1>Happy Birthday Surbhi Madam Ji ❤️</h1>

<button onclick="start()">Start Surprise</button>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<!-- Cake Section -->

<div id="cakeSection" class="section">

<h2>Cut Your Birthday Cake 🎂</h2>

<div class="cake" onclick="cutCake()">🎂</div>

</div>

<!-- Gallery Section -->

<div id="gallerySection" class="section">

<h2>Our Cute Memories 📸</h2>

<div class="gallery">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">

</div>

<button onclick="openGame()">Next Surprise</button>

</div>

<!-- Game Section -->

<div id="gameSection" class="section">

<h2>🍫 Collect Chocolates Game</h2>

<p>Click chocolates and collect them!</p>

<h3>Your Chocolates: <span id="score">0</span></h3>

<button onclick="startGame()">Start Game</button>

<div id="gameArea" style="
width:100%;
height:300px;
background:#fff3f7;
margin-top:20px;
position:relative;
overflow:hidden;
border-radius:20px;
"></div>

<br>

<button onclick="openLetter()">Next Surprise</button>

</div>

<!-- Love Letter -->

<div id="letterSection" class="section">

<h2>Special Message For You 💌</h2>

<div class="envelope" onclick="showLetter()">✉️</div>

<div id="letter">
<p id="typing"></p>
</div>

</div>

<script>

function start(){

document.querySelector("button").style.display="none"

document.getElementById("cakeSection").style.display="block"

}

function cutCake(){

document.getElementById("music").play()

document.getElementById("cakeSection").style.display="none"

document.getElementById("gallerySection").style.display="block"

createHearts()
createConfetti()

}

function openGame(){

document.getElementById("gallerySection").style.display="none"

document.getElementById("gameSection").style.display="block"

}

function openLetter(){

document.getElementById("gameSection").style.display="none"

document.getElementById("letterSection").style.display="block"

}

function showLetter(){

document.getElementById("letter").style.display="block"

typeMessage()

}

function typeMessage(){

let text="Surbhi Madam Ji, you are one of the most beautiful and kind people. Your smile makes every moment special. May your life always be full of happiness and love. Happy Birthday ❤️"

let i=0

function typing(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)

i++

setTimeout(typing,40)

}

}

typing()

}

function createHearts(){

for(let i=0;i<80;i++){

let heart=document.createElement("div")

heart.innerHTML="❤️"

heart.className="heart"

heart.style.left=Math.random()*100+"%"

heart.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(heart)

}

}

function createConfetti(){

for(let i=0;i<80;i++){

let conf=document.createElement("div")

conf.className="confetti"

conf.style.left=Math.random()*100+"%"

conf.style.background="hsl("+Math.random()*360+"deg,100%,50%)"

conf.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(conf)

}

}

let score=0
let gameRunning=false

function startGame(){

score=0
document.getElementById("score").innerText=score
gameRunning=true
spawnChocolate()

setTimeout(()=>{
gameRunning=false
alert("You collected "+score+" chocolates 🍫")
},15000)

}

function spawnChocolate(){

if(!gameRunning) return

let choco=document.createElement("div")
choco.innerHTML="🍫"
choco.className="choco"

choco.style.left=Math.random()*90+"%"

choco.onclick=function(){
score++
document.getElementById("score").innerText=score
choco.remove()
}

document.getElementById("gameArea").appendChild(choco)

setTimeout(()=>{choco.remove()},4000)

setTimeout(spawnChocolate,800)

}

</script>

</body>
</html>
```
