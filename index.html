<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Surbhi Madam Ji</title>

<style>

body{
margin:0;
padding:0;
background:#000;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
margin-top:100px;
}

h1{
font-size:50px;
color:#ff4d6d;
}

p{
font-size:22px;
max-width:700px;
margin:auto;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
gap:20px;
}

.gallery img{
width:200px;
height:200px;
object-fit:cover;
border-radius:15px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

#cake{
font-size:80px;
animation: cake 1s infinite alternate;
}

@keyframes cake{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

#typing{
border-right:3px solid white;
display:inline-block;
white-space:nowrap;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container" id="page1">

<h1>Someone Special's Birthday 🎉</h1>

<p>I made a small surprise website for a very special friend ❤️</p>

<button onclick="startSurprise()">Open Surprise</button>

</div>

<div class="container hidden" id="page2">

<div id="cake">🎂</div>

<h1>Happy Birthday</h1>

<h1>Surbhi Madam Ji ❤️</h1>

<p id="typing"></p>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
<img src="https://images.unsplash.com/photo-1502685104226-ee32379fefbe">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">

</div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

function startSurprise(){

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

document.getElementById("music").play();

typeMessage();

startConfetti();

}

const message = "Aap meri bahut achi dost ho. Aap hamesha happy raho. Aapki life success aur happiness se bhari rahe. Happy Birthday Surbhi Madam Ji ❤️🎂";

let i = 0;

function typeMessage(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeMessage,50);

}

}

function startConfetti(){

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetti = [];

for(let i=0;i<150;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+2,
d:Math.random()*150
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

ctx.beginPath();

for(let i=0;i<confetti.length;i++){

let c = confetti[i];

ctx.moveTo(c.x,c.y);

ctx.arc(c.x,c.y,c.r,0,Math.PI*2,true);

}

ctx.fill();

update();

}

function update(){

for(let i=0;i<confetti.length;i++){

let c = confetti[i];

c.y += Math.cos(c.d)+1;

c.x += Math.sin(c.d);

if(c.y > canvas.height){

confetti[i] = {
x:Math.random()*canvas.width,
y:0,
r:c.r,
d:c.d
};

}

}

}

setInterval(draw,20);

}

</script>

</body>
</html>
