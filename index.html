<!DOCTYPE html>
<html>
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surbhi Madam Ji Birthday Surprise</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

/* pages */

.page{
display:none;
padding:40px;
}

.active{
display:block;
}

/* buttons */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

/* typewriter */

#typeText{
font-size:22px;
max-width:700px;
margin:auto;
line-height:1.6;
}

/* loading animation */

.loadingText{
font-size:40px;
position:relative;
animation: floatLeft 3s infinite alternate;
}

@keyframes floatLeft{

from{left:-50px}

to{left:50px}

}

/* gallery */

.gallery{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;

}

.card{

position:relative;
width:220px;
height:220px;
overflow:hidden;
border-radius:12px;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
color:white;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.4s;
padding:10px;

}

.card:hover .overlay{

opacity:1;

}

h1{

color:#ff4d6d;
font-family:cursive;

}

</style>

</head>

<body>

<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>Message For You ❤️</h1>

<p id="typeText"></p>

<br>

<button onclick="nextPage(2)">Next</button>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<h1 class="loadingText">Loading Your Birthday Surprise...</h1>

<br><br>

<button onclick="nextPage(3)">Start The Surprise</button>

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>Our Cute Memories ❤️</h1>

<div class="gallery">

<div class="card">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330">

<div class="overlay">

Your smile is the most beautiful thing ❤️

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">

<div class="overlay">

You make every moment special ✨

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1502685104226-ee32379fefbe">

<div class="overlay">

You are an amazing person 🌸

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">

<div class="overlay">

Lucky to have you in my life 💖

</div>

</div>

</div>

<br>

<button onclick="alert('Next page me cake surprise ayega 🎂')">

Next

</button>

</div>


<script>

/* typewriter text */

const message = `

Today is a special day for you.

Do you really think hum aapka birthday bhul gaye the?

Actually main bas pretend kar raha tha...

Kyuki mujhe aapko surprise dena tha.

Uske liye sorry 😊

Yeh chocolate aapke liye 🍫

So be ready for your surprise ❤️

`;

let i=0;

function typeWriter(){

if(i<message.length){

document.getElementById("typeText").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

typeWriter();

/* page change */

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById("page"+page).classList.add("active");

}

</script>

</body>
</html>
