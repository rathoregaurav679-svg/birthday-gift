<!DOCTYPE html>
<html>
<head>

<title>Surbhi Madam Ji Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

h1{
font-family:'Great Vibes',cursive;
font-size:60px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2d55;
color:white;
cursor:pointer;
}

.cake{
font-size:120px;
cursor:pointer;
margin-top:20px;
}

.teddy{
font-size:100px;
display:none;
}

</style>

</head>

<body>

<h1>Happy Birthday Surbhi Madam Ji ❤️</h1>

<p>Today is a very special day for you</p>

<button onclick="showCake()">Start Surprise</button>

<div id="cake" class="cake" onclick="cutCake()" style="display:none">
🎂
</div>

<div id="teddy" class="teddy">
🧸
</div>

<script>

function showCake(){
document.getElementById("cake").style.display="block"
}

function cutCake(){
alert("Cake Cut Successfully 🎂")
document.getElementById("teddy").style.display="block"
}

</script>

</body>
</html>
