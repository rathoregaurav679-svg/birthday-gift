<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
overflow:hidden;
}

.container{
max-width:700px;
padding:30px;
}

h1{
font-size:55px;
margin-bottom:10px;
}

p{
font-size:20px;
line-height:1.6;
}

button{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#surprise{
display:none;
margin-top:20px;
font-size:22px;
color:#fff;
}

.heart{
position:absolute;
color:#ff2e63;
font-size:20px;
animation: float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday ❤️</h1>

<p>
To the most special girl in my life ✨  
Tumhari smile meri duniya ko bright bana deti hai.  
Aaj ka din sirf tumhare liye hai.  
May your life be filled with love, happiness and endless smiles. 💕
</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div id="surprise">
You are truly amazing and I’m lucky to know you.  
Once again Happy Birthday! 🎂💖
</div>

</div>

<script>

function showMessage(){
document.getElementById("surprise").style.display="block";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
