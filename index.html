<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#fff0f5;
overflow-x:hidden;
}

.page{
display:none;
padding:40px;
}

#page1{
display:block;
}

button{
padding:12px 25px;
font-size:18px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.cake{
font-size:120px;
cursor:pointer;
transition:0.5s;
}

.teddy{
font-size:90px;
display:none;
cursor:pointer;
}

.chocolate{
font-size:80px;
display:none;
cursor:pointer;
}

.heart{
position:fixed;
color:red;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
width:300px;
}

</style>
</head>

<body>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page" id="page1">

<h2 id="typeText"></h2>

<button onclick="nextPage(2)">Next</button>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

<h2>Loading Your Birthday Surprise 🎁</h2>

<button onclick="nextPage(3)">Start Surprise</button>

</div>

<!-- PAGE 3 Memories -->
<div class="page" id="page3">

<h1>Our Cute Memories ❤️</h1>

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659" width="200">

<br>

<button onclick="nextPage(4)">Next</button>

</div>

<!-- PAGE 4 Cake -->
<div class="page" id="page4">

<h1>Happy Birthday Surbhi Madam Ji ❤️</h1>

<div class="cake" onclick="cutCake()">🎂</div>

<div class="teddy" id="teddy" onclick="showChocolate()">🧸</div>

<div class="chocolate" id="choco" onclick="showHearts()">🍫</div>

</div>

<!-- SECRET MESSAGE -->
<div class="popup" id="lovePopup">

<h2>Secret Message 💌</h2>

<p>
You are the most beautiful person in my life ❤️  
Your smile makes my world brighter.  
I am lucky to have you.  
Happy Birthday my special one.  
</p>

</div>

<br>

<button onclick="playMusic()">Play Romantic Music 🎵</button>

<script>

let text="Today is special day for you. Do you really think I forgot your birthday? I was pretending so I could surprise you. So be ready for your surprise ❤️";

let i=0;

function typeWriter(){

if(i<text.length){

document.getElementById("typeText").innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

typeWriter();

function nextPage(num){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById("page"+num).style.display="block";

}

function cutCake(){

document.querySelector(".cake").innerHTML="🍰";

document.getElementById("teddy").style.display="block";

}

function showChocolate(){

document.getElementById("choco").style.display="block";

}

function showHearts(){

for(let i=0;i<100;i++){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

}

document.getElementById("lovePopup").style.display="block";

}

function playMusic(){

document.getElementById("music").play();

}

</script>

</body>
</html>
